name: Publish to Crates.io

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Run CI checks
        run: ./scripts/ci.sh

      - name: Sync Cargo.toml version with Tag
        shell: bash
        run: |
          # Extract version from tag (e.g., refs/tags/v0.2.1 -> 0.2.1)
          # Use parameter expansion to strip 'refs/tags/v' prefix
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Syncing Cargo.toml version to $VERSION"
          
          # Update Cargo.toml using sed. 
          # Matches: version = "..." -> version = "$VERSION"
          # Ensures only the first occurrence (package version) is replaced.
          sed -i "0,/^version = .*/s//version = \"$VERSION\"/" Cargo.toml
          
          # Verify the change
          grep "^version" Cargo.toml

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
